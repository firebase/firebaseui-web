packages:
  - packages/*
  - examples/*
  - e2e

catalog:
  "@angular-devkit/architect": ^0.2003.31
  "@angular-devkit/build-angular": ^20.3.31
  "@angular-devkit/core": ^20.3.31
  "@angular/animations": ^20.3.25
  "@angular/cli": ^20.3.31
  "@angular/common": ^20.3.25
  "@angular/compiler": ^20.3.25
  "@angular/compiler-cli": ^22.0.4
  "@angular/core": ^20.3.25
  "@angular/fire": ^20.0.1
  "@angular/forms": ^20.3.25
  "@angular/platform-browser": ^20.3.25
  "@angular/platform-browser-dynamic": ^20.3.25
  "@angular/platform-server": ^20.3.25
  "@angular/router": ^20.3.25
  "@angular/ssr": ^20.3.25
  "@tailwindcss/vite": ^4.3.2
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@types/jsdom": ^28.0.3
  "@types/node": ^26.1.0
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@vitest/coverage-v8": ^4.1.9
  "@vitest/ui": ^4.1.9
  "@nanostores/deepmap": ^1.0.0
  "@playwright/test": 1.61.1
  "@vitejs/plugin-react": ^6.0.3
  eslint: ^9.39.4
  firebase: ^11.10.0
  jsdom: ^29.1.1
  nanostores: ^1.4.0
  next: 16.2.10
  postcss: ^8.5.16

  prettier: ^3.9.4
  react: 19.2.7
  react-dom: 19.2.7
  react-router: ^8.1.0
  rimraf: ^6.1.3
  rxjs: ^7.8.2
  tailwindcss: ^4.3.2
  tsup: 8.5.1
  typescript: ^5.9.3
  vite: ^8.1.3
  vitest: ^4.1.9
  vitest-tsconfig-paths: ^3.4.1
  zod: 4.4.3
  zone.js: ^0.15.1

catalogs:
  peerDependencies:
    "@angular/fire": ^20
    firebase: ^11 || ^12
    react: ^19
    react-dom: ^19

onlyBuiltDependencies:
  - "@firebase/util"
  - "@parcel/watcher"
  - esbuild
  - lmdb
  - msgpackr-extract
  - msw
  - protobufjs
  - sharp
  - unrs-resolver

allowBuilds:
  "@firebase/util": true
  "@parcel/watcher": true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

gitChecks: false

# Block @angular/fire optional peer firebase-tools from entering the lockfile (e2e uses npx; CI uses global install).
peerDependencyRules:
  ignoreMissing:
    - firebase-tools

overrides:
  firebase-tools: "-"

minimumReleaseAgeExclude:
  - libphonenumber-js@1.13.8
  - react-resizable-panels@4.12.1
  - shadcn@4.13.0
  - tsx@4.23.0
