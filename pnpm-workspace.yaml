packages:
  - packages/*
  - examples/*
  - e2e

catalog:
  "@angular-devkit/architect": ^0.2200.5
  "@angular-devkit/build-angular": ^22.0.5
  "@angular-devkit/core": ^22.0.4
  "@angular/animations": ^22.0.5
  "@angular/cli": ^22.0.5
  "@angular/common": ^22.0.5
  "@angular/compiler": ^22.0.5
  "@angular/compiler-cli": ^22.0.5
  "@angular/core": ^22.0.5
  "@angular/fire": ^20.0.1
  "@angular/forms": ^22.0.5
  "@angular/platform-browser": ^22.0.5
  "@angular/platform-browser-dynamic": ^22.0.5
  "@angular/platform-server": ^22.0.5
  "@angular/router": ^22.0.5
  "@angular/ssr": ^22.0.5
  ng-packagr: ^22.0.1
  "@tailwindcss/vite": ^4.3.2
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@types/jsdom": ^28.0.3
  "@types/node": ^26.1.0
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@vitest/coverage-v8": ^4.1.9
  "@vitest/ui": ^4.1.9
  "@nanostores/deepmap": ^1.0.0
  "@playwright/test": 1.61.1
  "@vitejs/plugin-react": ^6.0.3
  eslint: ^9.39.4
  firebase: ^11.10.0
  jsdom: ^29.1.1
  nanostores: ^1.4.0
  next: 16.2.10
  postcss: ^8.5.16

  prettier: ^3.9.4
  react: 19.2.7
  react-dom: 19.2.7
  react-router: ^8.1.0
  rimraf: ^6.1.3
  rxjs: ^7.8.2
  tailwindcss: ^4.3.2
  tsup: 8.5.1
  typescript: ^6.0.3
  vite: ^8.1.3
  vitest: ^4.1.9
  vitest-tsconfig-paths: ^3.4.1
  zod: 4.4.3
  zone.js: ^0.15.1

catalogs:
  peerDependencies:
    "@angular/fire": ^20
    firebase: ^11 || ^12
    react: ^19
    react-dom: ^19

onlyBuiltDependencies:
  - "@firebase/util"
  - "@parcel/watcher"
  - esbuild
  - lmdb
  - msgpackr-extract
  - msw
  - protobufjs
  - sharp
  - unrs-resolver

allowBuilds:
  "@firebase/util": true
  "@parcel/watcher": true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

gitChecks: false

# Block @angular/fire optional peer firebase-tools from entering the lockfile (e2e uses npx; CI uses global install).
peerDependencyRules:
  ignoreMissing:
    - firebase-tools
  allowedVersions:
    "@angular/core": "22"
    "@angular/common": "22"
    "@angular/platform-browser": "22"
    "@angular/platform-browser-dynamic": "22"
    "@angular/forms": "22"
    "@angular/router": "22"

overrides:
  firebase-tools: "-"

minimumReleaseAgeExclude:
  - libphonenumber-js@1.13.8
  - react-resizable-panels@4.12.1
  - shadcn@4.13.0
  - tsx@4.23.0
