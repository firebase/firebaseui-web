name: E2E

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "examples/**"
      - "e2e/**"
      - "scripts/**"
      - "firebase.json"
      - ".github/workflows/e2e.yaml"
      - ".github/workflows/test.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "packages/**"
      - "examples/**"
      - "e2e/**"
      - "scripts/**"
      - "firebase.json"
      - ".github/workflows/e2e.yaml"
      - ".github/workflows/test.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version="$(pnpm --filter=e2e exec node -p "require('@playwright/test/package.json').version")"
          echo "playwright-version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.playwright-version }}

      - name: Install Playwright browsers
        run: pnpm --filter=e2e exec playwright install --with-deps chromium

      - name: Run UI e2e smoke
        run: pnpm test:e2e

      - name: Upload Playwright report and coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            e2e/playwright-report/
            e2e/coverage-report/
          if-no-files-found: ignore
