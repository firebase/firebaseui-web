name: E2E

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'examples/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    paths:
      - 'packages/**'
      - 'examples/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

jobs:
  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.0
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version="$(pnpm --filter=e2e exec node -p "require('@playwright/test/package.json').version")"
          echo "playwright-version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.playwright-version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Firebase CLI
        run: npm i -g firebase-tools@14.15.2

      - name: Enable webframeworks experiment
        run: firebase experiments:enable webframeworks

      - name: Start Firebase emulator
        run: |
          firebase emulators:start --only auth --project demo-test &
          sleep 15
          until wget -q --spider http://localhost:9099 2>/dev/null; do
            echo "Waiting for emulator to start..."
            sleep 2
          done
          echo "Emulator is ready"

      - name: Install Playwright browsers
        run: pnpm --filter=e2e exec playwright install --with-deps chromium

      - name: Run UI e2e smoke
        run: pnpm test:e2e
